site_name: Peanutbook
site_description: Peanutbook — a Markdown-based format for writing books; built with peanutbook
site_url: !ENV [READTHEDOCS_CANONICAL_URL, 'https://peanutbook.com/']
# RTD sets READTHEDOCS_CANONICAL_URL on build → readthedocs.io URLs.
# Local ./build-site.sh uses the default → peanutbook.com URLs.
# Intentionally no repo_url / edit_uri — public docs repo has no Python source to link.

docs_dir: docs
strict: false

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - What is Peanutbook?: what-is-peanutbook.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Project layout: project-structure.md
  - Configuration: configuration.md
  - Theme: theme.md
  - Multi-language: multi-language.md
  - Covers & templates: covers-templates.md
  - Business plans: bizplan.md
  - HTML generation: html-generation.md
  - Command reference:
      - Overview: commands/overview.md
      - Build & convert: commands/build-convert.md
      - Batch release: commands/batch-release.md
      - Editorial tools: commands/editorial-tools.md
  - Python API: python-api.md
  - System requirements: system-requirements.md
  - Authoring:
      - Syntax reference: markdown-syntax-extensions.md
      - Chapter format: chapter-format.md
  - PDF post-processing:
      - Watermarks: watermark.md
      - PDF protection: pdf-protection.md
  - Troubleshooting:
      - Cross-references: cross-references-troubleshooting.md

extra:
  analytics:
    provider: google
    property: G-NPTR4NLLEQ

# No GitHub "edit this page" or repo icon — avoids pointing readers at a source tree.
